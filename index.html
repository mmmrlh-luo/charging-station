function gcj2wgs(lat, lng) {

  return [lat - dlat, lng - dlng];

// ============================== STATE ======================================
let curV="all",curCity="all",curRegion="all",mm=null,ms=[],dm=null,dmk=null;

// ============================== FILTERS ====================================
function getCityCounts(){const c={};S.forEach(s=>{c[s.city]=(c[s.city]||0)+1});return c}
function getRegionCounts(city){const f=city==="all"?S:S.filter(s=>s.city===city);const r={};f.forEach(s=>{r[s.region]=(r[s.region]||0)+1});return r}
function flt(){return S.filter(s=>{if(curV!=="all"){const vi=vOrder.indexOf(s.v[s.v.length-1]),si=vOrder.indexOf(curV);if(vi<si)return false}if(curCity!=="all"&&s.city!==curCity)return false;if(curRegion!=="all"&&s.region!==curRegion)return false;return true})}

function renderFilters(){const cc=getCityCounts(),cs=Object.keys(cc).sort();let h='<button class="city-btn'+(curCity==="all"?' active':'')+'" data-city="all">全部 <span class="count">('+S.length+')</span></button>';cs.forEach(c=>{h+='<button class="city-btn'+(curCity===c?' active':'')+'" data-city="'+c+'">'+c+' <span class="count">('+cc[c]+')</span></button>'});document.getElementById("cityFilter").innerHTML=h
const dw=document.getElementById("districtFilter"),dl=document.getElementById("districtLabel");if(curCity==="all"||curCity==="佛山"||curCity==="中山"){dw.classList.remove("show");dl.style.display="none";curRegion="all"}else{dw.classList.add("show");dl.style.display="block";const rc=getRegionCounts(curCity),rs=Object.keys(rc).sort();let rh='<button class="filter-btn'+(curRegion==="all"?' active':'')+'" data-region="all">全部 <span class="count">('+flt().length+')</span></button>';rs.forEach(r=>{rh+='<button class="filter-btn'+(curRegion===r?' active':'')+'" data-region="'+r+'">'+r+' <span class="count">('+rc[r]+')</span></button>'});dw.innerHTML=rh}}

// ============================== MAP ========================================
function mCol(m){if(m>=17)return"#9b59b6";if(m>=12)return"#e74c3c";if(m>=10)return"#f39c12";return"#00b894"}
function mIc(s){const c=mCol(s.maxLen),ic=s.maxLen>=17?"🚛":s.maxLen>=12?"🚌":s.maxLen>=10?"🚐":"🚗";return L.divIcon({className:"",html:'<div style="background:'+c+';color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:pointer">'+ic+"</div>",iconSize:[30,30],iconAnchor:[15,15]})}
function initM(){mm=L.map("mainMap",{zoomControl:true,attributionControl:false});L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OSM © CARTO"}).addTo(mm);S.forEach(s=>{const m=L.marker([s.lat,s.lng],{icon:mIc(s)});m._id=s.id;const vi=s.v.map(x=>VM[x].icon).join(" ");const wgs=gcj2wgs(s.lat,s.lng);m.setLatLng(wgs);m.bindTooltip('<div style="font-size:12px;"><strong>⚡ '+s.name+'</strong><br/>📍 '+s.addr+'<br/>🔌 '+s.guns+'枪 · ⚡'+s.pw+'kW<br/>📏 ≤'+s.maxLen+'米<br/>'+vi+'</div>',{direction:"top",offset:[0,-15],className:"station-tooltip"});m.on("click",()=>rdrScroll(s.id));m.addTo(mm);ms.push(m)});fitM()}
function fitM(){if(!mm)return;const v=ms.filter(m=>!m._h);if(!v.length)return;mm.fitBounds(L.featureGroup(v).getBounds().pad(0.15))}
function updM(){const f=flt(),ids=new Set(f.map(s=>s.id));ms.forEach(m=>{if(ids.has(m._id)){if(m._h){mm.addLayer(m);m._h=false}}else{if(!m._h){mm.removeLayer(m);m._h=true}}});fitM()}

// ============================== CAROUSEL ===================================
var carouselIdx={};
function initCarousel(id){if(typeof carouselIdx[id]==='undefined')carouselIdx[id]=0}
function prevImg(id,e){if(e)e.stopPropagation();const imgs=IMG[id];if(!imgs||imgs.length<2)return;carouselIdx[id]=((carouselIdx[id]-1)+imgs.length)%imgs.length;updateCarousel(id)}
function nextImg(id,e){if(e)e.stopPropagation();const imgs=IMG[id];if(!imgs||imgs.length<2)return;carouselIdx[id]=(carouselIdx[id]+1)%imgs.length;updateCarousel(id)}
function updateCarousel(id){const wrap=document.getElementById("car"+id);if(!wrap)return;const imgs=IMG[id];wrap.querySelectorAll(".carousel-img").forEach((img,i)=>{img.classList.toggle("active",i===carouselIdx[id])});wrap.querySelectorAll(".carousel-dot").forEach((d,i)=>{d.classList.toggle("active",i===carouselIdx[id])})}

// ============================== RENDER =====================================
function rdrScroll(id){const el=document.querySelector('[data-id="'+id+'"]');if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.style.boxShadow="0 0 0 2px #0052d9, 0 4px 12px rgba(0,82,217,.2)";setTimeout(()=>{el.style.boxShadow=""},2000)}}
function rdr(){renderFilters();const el=document.getElementById("stationList"),em=document.getElementById("emptyState"),tc=document.getElementById("totalCount");const f=flt();if(!f.length){el.innerHTML="";em.classList.add("show");tc.textContent="共 0 个站点";updM();return}
em.classList.remove("show");tc.textContent="共 "+f.length+" 个站点";
el.innerHTML=f.map(s=>{const badgeTypes=s.v.map(x=>'<span class="type-badge '+VM[x].cls+'">'+VM[x].icon+" "+VM[x].label+"</span>").join("");
const g=IMG[s.id]||[];const hasImgs=g.length>0;
let carHtml='<div class="card-carousel" id="car'+s.id+'">';
if(hasImgs){g.forEach((b64,i)=>{carHtml+='<img class="carousel-img'+(i===0?' active':'')+'" src="data:image/jpeg;base64,'+b64+'" loading="lazy" onerror="this.style.display=\'none\'" />'});if(g.length>1){carHtml+='<button class="carousel-arrow prev" aria-label="上一张" onclick="prevImg('+s.id+',event)">◀</button><button class="carousel-arrow next" aria-label="下一张" onclick="nextImg('+s.id+',event)">▶</button>'};carHtml+='<div class="carousel-dots">'+g.map((_,i)=>'<button class="carousel-dot'+(i===0?' active':'')+'" aria-label="查看第 '+(i+1)+' 张图片" onclick="carouselIdx['+s.id+']='+i+';updateCarousel('+s.id+')"></button>').join("")+'</div>'}else{carHtml+='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;opacity:.4;background:#e8f0f8;">📷</div>'}
carHtml+='</div>';
return '<div class="station-card" data-id="'+s.id+'">'+carHtml+'<div class="card-body"><div class="card-title">⚡ '+s.name+' <span class="stat">营业中</span></div><div class="card-addr">📍 '+s.addr+'</div><div class="card-tag-row"><span class="card-tag" style="background:#fff3e0;color:#e65100;">🔌 '+s.guns+'枪</span><span class="card-tag" style="background:#e3f2fd;color:#1565c0;">⚡'+s.pw+'kW</span><span class="card-tag" style="background:#f3e5f5;color:#7b1fa2;">🗺️ '+s.region+'</span></div><div class="card-type-row">'+badgeTypes+'</div><div class="card-desc">'+s.d+'</div><div class="card-actions"><button class="btn-nav" onclick="event.stopPropagation();(function(){var u=\'https://ditu.amap.com/search?query=\'+encodeURIComponent(s.name);var w=window.open(u,\'_blank\');if(!w||w.closed){st(\'打开导航…\');setTimeout(function(){window.location.href=u},300)}})()">🗺️ 导航前往</button><button class="btn-share" onclick="event.stopPropagation();(function(){var txt=\'⚡ '+s.name+'\\n📍 '+s.addr+'\\n🔌 '+s.guns+'把枪 | ⚡'+s.pw+'kW\\n📏 '+s.v.map(x=>VM[x].label).join("、")+'\\n'+s.d+'\';if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){st(\'已复制站点信息\')}).catch(function(){st(\'复制失败，请长按复制\');prompt(\'复制站点信息：\',txt)})}else{prompt(\'复制站点信息：\',txt)}})()">📤 分享站点</button></div></div></div>'
}).join("");
document.querySelectorAll(".station-card").forEach(el=>{el.addEventListener("click",()=>{const id=parseInt(el.dataset.id);rdrScroll(id)})});
// Init carousels
f.forEach(s=>{initCarousel(s.id)});updM()}

// ============================== TOAST ======================================
let tt=null;function st(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2000)}

// ============================== BINDINGS ===================================
initM();rdr();

document.querySelectorAll("#vehicleFilter .v-opt").forEach(el=>{el.addEventListener("click",()=>{document.querySelectorAll("#vehicleFilter .v-opt").forEach(x=>x.classList.remove("active"));el.classList.add("active");el.setAttribute("aria-pressed","true");document.querySelectorAll("#vehicleFilter .v-opt").forEach(x=>{if(x!==el)x.setAttribute("aria-pressed","false")});curV=el.dataset.vehicle;rdr()});el.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" ")this.click()})});

document.getElementById("districtFilter").addEventListener("click",function(e){const btn=e.target.closest(".filter-btn");if(!btn)return;this.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));btn.classList.add("active");curRegion=btn.dataset.region;rdr()});
// District filter delegation
document.getElementById("districtFilter").addEventListener("click",function(e){const btn=e.target.closest(".filter-btn");if(!btn)return;this.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));btn.classList.add("active");btn.setAttribute("aria-pressed","true");this.querySelectorAll(".filter-btn").forEach(x=>{if(x!==btn)x.setAttribute("aria-pressed","false")});curRegion=btn.dataset.region;rdr()});
</script>
</body>
</html>
